name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JUnit Suite dependencies
        run: |
          curl -L -o src/lib/junit-platform-suite-api-1.11.4.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-suite-api/1.11.4/junit-platform-suite-api-1.11.4.jar
          curl -L -o src/lib/junit-platform-suite-engine-1.11.4.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-suite-engine/1.11.4/junit-platform-suite-engine-1.11.4.jar
          curl -L -o src/lib/junit-platform-suite-commons-1.11.4.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-suite-commons/1.11.4/junit-platform-suite-commons-1.11.4.jar

      - name: Compile Java sources
        run: |
          mkdir -p bin
          find src -name '*.java' > sources.txt
          javac -cp "src/lib/*" --release 17 -d bin @sources.txt

      - name: Run tests with JaCoCo coverage
        run: |
          java -javaagent:tools/jacoco/lib/jacocoagent.jar=destfile=jacoco.exec \
            -jar src/lib/junit-platform-console-standalone-1.13.0-M3.jar \
            -cp "bin:src/lib/junit-platform-suite-api-1.11.4.jar:src/lib/junit-platform-suite-engine-1.11.4.jar:src/lib/junit-platform-suite-commons-1.11.4.jar" \
            --select-class=UnitTests.CoreGameSuite \
            --select-class=UnitTests.PlacementSuite

      - name: Generate JaCoCo XML report
        run: |
          java -jar tools/jacoco/lib/jacococli.jar report jacoco.exec \
            --classfiles bin/SettlersOfCatan/Player.class \
            --classfiles bin/SettlersOfCatan/Bank.class \
            --classfiles bin/SettlersOfCatan/Node.class \
            --classfiles bin/SettlersOfCatan/Edge.class \
            --classfiles bin/SettlersOfCatan/PlacementValidator.class \
            --sourcefiles src/SettlersOfCatan \
            --xml coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mli57_SettlersOfCatan
            -Dsonar.organization=mli57
            -Dsonar.sources=src/SettlersOfCatan
            -Dsonar.tests=src/UnitTests
            -Dsonar.java.binaries=bin
            -Dsonar.coverage.jacoco.xmlReportPaths=coverage.xml
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mli57_SettlersOfCatan
            -Dsonar.organization=mli57
            -Dsonar.sources=src/SettlersOfCatan
            -Dsonar.tests=src/UnitTests
            -Dsonar.java.binaries=bin
            -Dsonar.coverage.jacoco.xmlReportPaths=coverage.xml
            -Dsonar.inclusions=**/Bank.java,**/Player.java,**/Node.java,**/Edge.java,**/PlacementValidator.java